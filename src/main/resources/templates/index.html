<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Horários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-main {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 800px;
        }
        .header-title {
            text-align: center;
            color: #667eea;
            margin-bottom: 50px;
            font-weight: 700;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .menu-card {
            text-decoration: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            color: white;
            text-decoration: none;
        }
        .menu-card h3 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }
        .menu-card p {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.9;
        }
        @media (max-width: 576px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            .container-main {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <h1 class="header-title">🗓️ Gestão de Horários</h1>
        <div class="menu-grid">
            <a href="/professores" class="menu-card">
                <h3>👨‍🏫</h3>
                <h3>Professores</h3>
                <p>Gerenciar professores</p>
            </a>
            <a href="/turmas" class="menu-card">
                <h3>👥</h3>
                <h3>Turmas</h3>
                <p>Gerenciar turmas</p>
            </a>
            <a href="/disciplinas" class="menu-card">
                <h3>📚</h3>
                <h3>Disciplinas</h3>
                <p>Gerenciar disciplinas</p>
            </a>
            <a href="/horarios" class="menu-card">
                <h3>⏰</h3>
                <h3>Horários</h3>
                <p>Gerenciar horários</p>
            </a>
        </div>
        <hr>
        <div class="menu-grid">
            <a href="/horarios/por-professor" class="menu-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <h3>🔍</h3>
                <h3>Horários por Professor</h3>
                <p>Visualizar por professor</p>
            </a>
            <a href="/horarios/por-turma" class="menu-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <h3>🔍</h3>
                <h3>Horários por Turma</h3>
                <p>Visualizar por turma</p>
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
