<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Disciplina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">🗓️ Gestão de Horários</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/professores">Professores</a></li>
                    <li class="nav-item"><a class="nav-link" href="/turmas">Turmas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/disciplinas">Disciplinas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/horarios">Horários</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="header-section">
        <div class="container">
            <h1>📚 Nova Disciplina</h1>
            <p>Preencha os dados da disciplina</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="form-container">
                    <form th:action="@{/disciplinas}" th:object="${disciplina}" method="POST">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome *</label>
                            <input type="text" class="form-control" id="nome" th:field="*{nome}" required>
                        </div>

                        <div class="mb-3">
                            <label for="cargaHoraria" class="form-label">Carga Horária (horas) *</label>
                            <input type="number" class="form-control" id="cargaHoraria" th:field="*{cargaHoraria}" required>
                        </div>

                        <div class="mb-3">
                            <label for="professor" class="form-label">Professor *</label>
                            <select class="form-select" id="professor" name="professorId" required>
                                <option value="">Selecione um professor</option>
                                <option th:each="professor : ${professores}" th:value="${professor.id}" th:text="${professor.nome}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">💾 Salvar</button>
                            <a href="/disciplinas" class="btn btn-secondary">← Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
