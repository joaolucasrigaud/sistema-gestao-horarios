<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Horário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">🗓️ Gestão de Horários</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/professores">Professores</a></li>
                    <li class="nav-item"><a class="nav-link" href="/turmas">Turmas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/disciplinas">Disciplinas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/horarios">Horários</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="header-section">
        <div class="container">
            <h1>⏰ Novo Horário</h1>
            <p>Preencha os dados do horário</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-container">
                    <form th:action="@{/horarios}" th:object="${horario}" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="diaDaSemana" class="form-label">Dia da Semana *</label>
                                <select class="form-select" id="diaDaSemana" th:field="*{diaDaSemana}" required>
                                    <option value="">Selecione o dia</option>
                                    <option value="Segunda">Segunda-feira</option>
                                    <option value="Terça">Terça-feira</option>
                                    <option value="Quarta">Quarta-feira</option>
                                    <option value="Quinta">Quinta-feira</option>
                                    <option value="Sexta">Sexta-feira</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="turmaId" class="form-label">Turma *</label>
                                <select class="form-select" id="turmaId" name="turmaId" required>
                                    <option value="">Selecione uma turma</option>
                                    <option th:each="turma : ${turmas}" th:value="${turma.id}" th:text="${turma.codigo}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="horaInicio" class="form-label">Hora de Início *</label>
                                <input type="time" class="form-control" id="horaInicio" name="horaInicioStr" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="horaFim" class="form-label">Hora de Fim *</label>
                                <input type="time" class="form-control" id="horaFim" name="horaFimStr" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="disciplinaId" class="form-label">Disciplina *</label>
                                <select class="form-select" id="disciplinaId" name="disciplinaId" required>
                                    <option value="">Selecione uma disciplina</option>
                                    <option th:each="disciplina : ${disciplinas}" th:value="${disciplina.id}" th:text="${disciplina.nome}"></option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="professorId" class="form-label">Professor *</label>
                                <select class="form-select" id="professorId" name="professorId" required>
                                    <option value="">Selecione um professor</option>
                                    <option th:each="professor : ${professores}" th:value="${professor.id}" th:text="${professor.nome}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">💾 Salvar</button>
                            <a href="/horarios" class="btn btn-secondary">← Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
